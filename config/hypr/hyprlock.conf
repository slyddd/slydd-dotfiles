# ╚═╗│ └┬┘ ││ ││───│││ │ │ └─┐
# ╚═╝┴─┘┴ ─┴┘─┴┘  ─┴┘└─┘ ┴ └─┘
# Hyprlock Configuration File

general {
  hide_cursor = true
  ignore_empty_input = true
}

animations = {
  enabled = true
  animation = fade, 1, 1.8, linear
}

background {
  monitor =
  path = screenshot
  blur_passes = 3
  blur_size = 5
}

label {
  monitor =
  text = $TIME
  font_size = 12
  font_family = Roboto
  position = 0, 100
  align = center
  halign = center
}

label {
  monitor =
  text = You're locked!
  font_size = 12
  font_family = Roboto
  position = 0, -100
  valign = center
  halign = center
}

label {
  monitor =
  text = $FAIL
  font_size = 9
  font_family = Roboto
  color = rgb(255,0,0)
  position = 0, -150
  valign = center
  halign = center
}

image {
  monitor =
  path = ~/.face
  size = 100
  border_size = 0
  valign = center
  halign = center
}

input-field {
  monitor =
  size = 100, 100
  outline_thickness = 2
  hide_input = true
  fade_on_empty = true
  placeholder_text =
  inner_color = rgba(0,0,0,0)
  outer_color = rgba(0,0,0,0)
  check_color = rgba(255,255,255,0.5)
  hide_input_base_color = rgba(255,255,0,1)
  fail_text =
  fail_color = rgb(255,0,0)
  position = 0, 0
  valign = center
  halign = center
}
